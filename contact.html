<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Hollywood Bowls</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Hollywood Bowls</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2>Contact Us</h2>
    <p>Questions or catering inquiries? Drop us a line.</p>

    <form class="contact-form">
      <label>Name
        <input type="text" name="name" placeholder="Your name">
      </label>
      <label>Email
        <input type="email" name="email" placeholder="you@example.com">
      </label>
      <label>Message
        <textarea name="message" rows="4" placeholder="How can we help?"></textarea>
      </label>
      <button type="submit" class="btn">Send</button>
    </form>

    <section class="hours">
      <h3>Visit Us</h3>
      <p>123 Smoothie Lane, Hollywood — Open daily 8am–6pm</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Hollywood Bowls</p>
    </div>
  </footer>
</body>
</html>
